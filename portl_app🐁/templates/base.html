<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PORTL{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">PORTL</div>
    <div class="nav-links">
      <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Home</a>
      <a href="{{ url_for('simulation') }}" class="{% if request.endpoint == 'simulation' %}active{% endif %}">Simulation</a>
      <a href="{{ url_for('research') }}" class="{% if 'project' in request.endpoint or request.endpoint in ['research','new_session','view_session'] %}active{% endif %}">Research</a>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
