{% extends "base.html" %}
{% block title %}PORTL — Add Session{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="{{ url_for('view_project', project_id=project['id']) }}" class="breadcrumb">&larr; {{ project['title'] }}</a>
    <h1>Add Session</h1>
  </div>
</div>

<div class="card">
  <form method="POST" id="session-form">
    <div class="form-section">
      <h3>Session Info</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Session Number *</label>
          <input type="number" name="session_number" class="form-input" required min="1" value="1">
        </div>
        <div class="form-group">
          <label>Date *</label>
          <input type="date" name="date" class="form-input" required value="{{ today }}">
        </div>
        <div class="form-group">
          <label>Condition *</label>
          <input type="text" name="condition" class="form-input" required
                 placeholder="e.g., Baseline, FR5, VR5, Intervention">
        </div>
        <div class="form-group">
          <label>Number of Intervals</label>
          <input type="number" name="num_intervals" id="num-intervals-input" class="form-input"
                 min="1" max="20" value="3" onchange="renderIntervals()">
        </div>
        <div class="form-group full-width">
          <label>Procedure Notes</label>
          <textarea name="procedure_notes" class="form-input notes-input"
                    placeholder="Describe your procedure for this session (initial, intermediate, or final procedure)..."></textarea>
        </div>
        <div class="form-group full-width">
          <label>Teacher Notes</label>
          <textarea name="teacher_notes" class="form-input notes-input"
                    placeholder="Observations, what happened, decisions made..."></textarea>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>Interval Data</h3>
      <p class="hint">Record data for each 10-reinforcer interval.</p>
      <div id="intervals-container"></div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Session</button>
      <a href="{{ url_for('view_project', project_id=project['id']) }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Set today's date default
  document.querySelector('input[name="date"]').valueAsDate = new Date();

  function renderIntervals() {
    const n = parseInt(document.getElementById('num-intervals-input').value) || 1;
    const container = document.getElementById('intervals-container');
    container.innerHTML = '';
    for (let i = 1; i <= n; i++) {
      container.innerHTML += `
        <div class="interval-block">
          <h4>Interval ${i}</h4>
          <div class="form-grid">
            <div class="form-group">
              <label>Behavior Count</label>
              <input type="number" name="behavior_${i}" class="form-input" value="0" min="0">
            </div>
            <div class="form-group">
              <label>Reinforcers Delivered</label>
              <input type="number" name="reinforcers_${i}" class="form-input" value="10" min="0">
            </div>
            <div class="form-group">
              <label>Errors / No-responses</label>
              <input type="number" name="errors_${i}" class="form-input" value="0" min="0">
            </div>
            <div class="form-group full-width">
              <label>Plan / Notes for Next Interval</label>
              <textarea name="plan_${i}" class="form-input" rows="2"
                        placeholder="What did you observe? What will you change?"></textarea>
            </div>
          </div>
        </div>`;
    }
  }

  renderIntervals();
</script>
{% endblock %}
